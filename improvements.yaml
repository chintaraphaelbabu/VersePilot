  - phrase: "పాయింట్స్ (points) fuzzy-matches to Psalms"
    observed_count: 1
    suggested_category: "missing_correction_word"
    confidence: 0.95
    reason: >
      In segment 101, raw "10 11 పాయింట్స్" (10 11 points) was corrected
