# improvements.yaml
# Auto-generated from failure_report.md analysis (13-sermon batch replay).
# Review manually before merging.

proposals:

  # ── BUG: end_verse not reset on new book in CorrectionEngine ─────────
  - phrase: "end_verse not reset on new BOOK token"
    observed_count: 1
    suggested_category: "correction_engine_bug"
    confidence: 1.0
    reason: >
      When CorrectionEngine processes a second BOOK: token in the same
      utterance, it sets chapter=None and verse=None but does NOT clear
      end_verse. This causes the previous end_verse (16) to leak into the
      output. Raw: "...మొదటి పేతురు 1 అధ్యాయము 13 నుంచి 16 వరకు... మొదటి పేతురు 1 అధ్యాయము"
      → corrected "1 Peter 1 16" instead of "1 Peter 1 13 16".
      Fix: add self.ref.end_verse = None in the BOOK: handler.

  # ── BibleSearch searches text buffer instead of built reference ──────
  - phrase: "BibleSearch searches text buffer instead of built reference"
    observed_count: 4
    suggested_category: "code_architecture"
    confidence: 1.0
    reason: >
      In segments 35 (Psalms 1:2), 69 (Daniel 3:12), 81 (John 3:2),
      98 (Leviticus 11:45), the ReferenceBuilder correctly identified a
      complete reference, but BibleSearch searched the accumulated text
      buffer (hundreds of chars of garbage from prior segments) instead
      of the built reference. When builder.state == COMPLETE or
      builder.verse is set, pass the built reference directly to
      BibleSearch instead of session.text_buffer.

  # ── Intent detector false positives on long sermon text ──────────────
  - phrase: "REFERENCE intent on utterance with no book name"
    observed_count: 2
    suggested_category: "intent_detector_tuning"
    confidence: 0.85
    reason: >
      Two long utterances (segments 72, 97) with no Bible book name were
      classified as REFERENCE (confidence 0.90). They contain sermon
      exposition, not references. Consider raising REFERENCE threshold or
      adding a "must contain book-like token" heuristic.

